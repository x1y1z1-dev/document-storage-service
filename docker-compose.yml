###############################################################################
# docker-compose.yml — PDF/DOCX File Storage Service
#
# Services
#   app       Laravel application (php-fpm + nginx + scheduler via supervisor)
#   db        MySQL 8 — persistent named volume for data
#   rabbitmq  RabbitMQ 3 with management plugin
#
# Requirements satisfied:
#   7.1  — all three services defined; app depends_on db+rabbitmq healthy
#   7.2  — app reachable on host port APP_PORT (default 8080)
#   7.3  — named volume for MySQL data
#   7.4  — named volume for uploaded files
#   14.6 — GET /health used as Docker health check on the app service
###############################################################################

services:

  # ── Laravel application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: document-storage-service:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "${APP_NAME:-DocumentStorageService}"
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-http://localhost:${APP_PORT:-8080}}"
      # Database
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-file_storage}"
      DB_USERNAME: "${DB_USERNAME:-laravel}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD:-guest}"
      RABBITMQ_QUEUE: "${RABBITMQ_QUEUE:-file_notifications}"
      # Application settings
      NOTIFY_EMAIL: "${NOTIFY_EMAIL:-admin@example.com}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-10485760}"
      RETENTION_HOURS: "${RETENTION_HOURS:-24}"
      RATE_LIMIT_UPLOAD: "${RATE_LIMIT_UPLOAD:-20}"
      RATE_LIMIT_DELETE: "${RATE_LIMIT_DELETE:-30}"
      RATE_LIMIT_DOWNLOAD: "${RATE_LIMIT_DOWNLOAD:-60}"
      PAGINATION_PER_PAGE: "${PAGINATION_PER_PAGE:-15}"
      # Sessions / cache / queue all use the database driver
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      LOG_CHANNEL: stack
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Named volume for uploaded files — survives container restarts (Req 7.4)
      - uploads:/var/www/storage/app/uploads
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    # Docker health check using GET /health (Requirement 14.6)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-file_storage}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
    volumes:
      # Named volume for MySQL data — survives container restarts (Req 7.3)
      - db_data:/var/lib/mysql
    # MySQL health check: confirm the server is accepting connections
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "localhost"
        - "-u"
        - "root"
        - "--password=${DB_ROOT_PASSWORD:-rootsecret}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── RabbitMQ 3 with management plugin ───────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-guest}"
    ports:
      # Management UI — useful during development; remove in production
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # RabbitMQ health check: use the built-in rabbitmq-diagnostics tool
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  db_data:
    driver: local
  uploads:
    driver: local
  rabbitmq_data:
    driver: local
