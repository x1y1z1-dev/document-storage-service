###############################################################################
# nginx virtual-host configuration for the Laravel application
#
# Requirements satisfied:
#   11.4  — uploads/ directory is NOT web-accessible (returns 403)
#   7.1   — port 80 inside the container
###############################################################################

server {
    listen 80;
    server_name _;

    # Document root: Laravel's public/ directory
    root /var/www/public;
    index index.php;

    # ── Character set ─────────────────────────────────────────────────────────
    charset utf-8;

    # ── Access / error logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Upload body size ──────────────────────────────────────────────────────
    # Allow slightly more than the 10 MB app limit so Laravel can return a
    # proper 422 instead of nginx returning a 413.
    client_max_body_size 20M;

    # ── Security: deny direct HTTP access to the upload storage directory ─────
    # Requirement 11.4: the upload directory MUST NOT be web-accessible.
    #
    # Uploads are stored at storage/app/uploads/ inside the container and are
    # mounted as a Docker volume — they are never symlinked into public/.
    # The ^~ prefix ensures this block takes priority over regex locations and
    # stops nginx from trying to serve these files directly.
    #
    # Two guards cover any URI pattern that might reach the uploads tree:
    #   1. /storage/app/uploads/ — covers the raw storage path
    #   2. /uploads/             — belt-and-suspenders for any future symlinks
    location ^~ /storage/app/uploads/ {
        deny all;
        return 403;
    }

    location ^~ /uploads/ {
        deny all;
        return 403;
    }

    # ── Deny access to hidden files (.env, .git, etc.) ────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Primary location: route everything through index.php ──────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM passthrough ───────────────────────────────────────────────────
    # php-fpm and nginx both run inside the same container (managed by
    # supervisor), so the upstream is 127.0.0.1:9000.
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Forward the real client IP so Laravel's Request::ip() is accurate
        # when the container is behind an external load-balancer or reverse proxy.
        fastcgi_param  HTTP_X_FORWARDED_FOR   $proxy_add_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param  HTTP_X_FORWARDED_HOST  $host;

        # Generous timeouts for large file uploads and downloads
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }
}
